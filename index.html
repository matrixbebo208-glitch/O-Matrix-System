<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O-Matrix-System | نظام التصنيف الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <header>
            <h1>O-Matrix-System <span class="badge">V1.0</span></h1>
            <p>صنف بياناتك، وزع ملفاتك، وأرسل عبر الواتساب بضغطة زر.</p>
        </header>

        <div class="trial-banner" id="trial-banner">
            متبقي لك محاولات تجريبية: <span id="attempts-count">5</span> من 5
        </div>

        <main class="main-card">
            <div class="upload-area" id="drop-zone">
                <input type="file" id="fileInput" multiple hidden>
                <div class="icon">📁</div>
                <p id="upload-text">اسحب الملفات هنا أو اضغط للاختيار</p>
                <div id="file-list" style="margin-top: 10px; font-size: 0.9rem; color: #38bdf8;"></div>
            </div>

            <div class="rules-config">
                <h3>إعدادات التصنيف</h3>
                <div class="input-group">
                    <label>ابحث عن أرقام تبدأ بـ (كود الدولة):</label>
                    <input type="text" id="phone-prefix" placeholder="مثال: +20">
                </div>
                <div class="input-group">
                    <label>اسم المجلد أو الملف الناتج:</label>
                    <input type="text" id="folder-name" placeholder="مثال: عملاء_مصر">
                </div>
                <div class="input-group" id="id-input-section" style="display: none;">
                    <label>أدخل ID الاشتراك الخاص بك:</label>
                    <input type="text" id="user-id-input" placeholder="أدخل الـ ID لتفعيل النسخة الكاملة">
                </div>
            </div>

            <button class="btn-primary" id="process-btn" onclick="startProcessing()">بدء المعالجة والتوزيع</button>
        </main>

        <div id="admin-modal" class="modal">
            <div class="modal-content">
                <h2>لوحة الإدارة - تفعيل ID</h2>
                <p style="font-size: 0.8rem; margin-bottom: 10px;">أعطِ هذا الـ ID للمشترك بعد الدفع</p>
                <div class="input-group">
                    <input type="text" id="admin-target-id" placeholder="ID المشترك (مثلاً: Matrix-77)">
                </div>
                <div class="input-group">
                    <select id="admin-plan">
                        <option value="monthly">اشتراك شهري (50 ج.م)</option>
                        <option value="yearly">اشتراك سنوي (510 ج.م - خصم 15%)</option>
                    </select>
                </div>
                <button class="btn-success" onclick="confirmActivation()">تفعيل الـ ID الآن</button>
                <button class="btn-close" onclick="closeAdminModal()">إغلاق</button>
            </div>
        </div>

        <footer>
            <p>© 2026 جميع الحقوق محفوظة لـ O-Matrix-System</p>
            <p class="version" id="version-trigger" onclick="handleVersionClick()">Version 1.0.0</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
